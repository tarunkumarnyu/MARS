<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7" fill="none" stroke="#333" stroke-width="1.2" stroke-linejoin="round" stroke-linecap="round"/>
    </marker>
    <marker id="arr-pwr" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7" fill="none" stroke="#1D9E75" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round"/>
    </marker>
  </defs>

  <rect width="900" height="720" fill="#fff"/>

  <!-- ══════════ SENSING ══════════ -->
  <text x="32" y="32" fill="#333" font-size="13" font-weight="600">Sensing</text>

  <rect x="32" y="50" width="836" height="78" rx="10" fill="#EBF5FF" stroke="#4A90D9" stroke-width="1"/>
  <text x="450" y="76" text-anchor="middle" fill="#1A5694" font-size="14" font-weight="600">ZED 2i Stereo Camera (Stereolabs)</text>
  <text x="450" y="96" text-anchor="middle" fill="#4A78A5" font-size="11">Stereo depth · IMU · Visual-Inertial Odometry @ 60 Hz</text>
  <text x="450" y="114" text-anchor="middle" fill="#4A78A5" font-size="10">USB 3.0 → companion laptop</text>

  <line x1="200" y1="128" x2="200" y2="180" stroke="#333" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="156" y="142" width="92" height="20" rx="10" fill="#fff" stroke="#bbb" stroke-width="0.8"/>
  <text x="202" y="156" text-anchor="middle" fill="#666" font-size="10">/zed/.../odom</text>

  <line x1="700" y1="128" x2="700" y2="180" stroke="#333" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="638" y="142" width="124" height="20" rx="10" fill="#fff" stroke="#bbb" stroke-width="0.8"/>
  <text x="700" y="156" text-anchor="middle" fill="#666" font-size="10">/zed/.../point_cloud</text>

  <!-- ══════════ COMPUTE ══════════ -->
  <text x="32" y="172" fill="#333" font-size="13" font-weight="600">Companion compute · Ubuntu 24.04 · ROS 2 Jazzy</text>

  <rect x="24" y="184" width="852" height="280" rx="10" fill="none" stroke="#bbb" stroke-width="0.8" stroke-dasharray="6,3"/>

  <!-- zed_mavros_bridge -->
  <rect x="40" y="200" width="320" height="78" rx="8" fill="#E6F7F0" stroke="#1D9E75" stroke-width="1"/>
  <text x="200" y="226" text-anchor="middle" fill="#085041" font-size="13" font-weight="600">zed_mavros_bridge</text>
  <text x="200" y="244" text-anchor="middle" fill="#3A8A6E" font-size="10">ZED odom → vision_pose + vision_speed</text>
  <text x="200" y="262" text-anchor="middle" fill="#3A8A6E" font-size="9" font-style="italic">rover_nav/zed_mavros_bridge.py</text>

  <!-- Nav2 -->
  <rect x="540" y="200" width="320" height="78" rx="8" fill="#FFF0E8" stroke="#D85A30" stroke-width="1"/>
  <text x="700" y="226" text-anchor="middle" fill="#712B13" font-size="13" font-weight="600">Nav2 stack</text>
  <text x="700" y="244" text-anchor="middle" fill="#A86040" font-size="10">global planner + RPP local controller</text>
  <text x="700" y="262" text-anchor="middle" fill="#A86040" font-size="10">costmap from ZED point cloud</text>

  <!-- vision_pose label -->
  <line x1="200" y1="278" x2="200" y2="324" stroke="#333" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="120" y="290" width="160" height="22" rx="11" fill="#fff" stroke="#bbb" stroke-width="0.8"/>
  <text x="200" y="305" text-anchor="middle" fill="#666" font-size="10">/mavros/vision_pose · vision_speed</text>

  <!-- cmd_vel from Nav2 down -->
  <line x1="700" y1="278" x2="700" y2="324" stroke="#333" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="660" y="290" width="80" height="22" rx="11" fill="#fff" stroke="#bbb" stroke-width="0.8"/>
  <text x="700" y="305" text-anchor="middle" fill="#666" font-size="10">/cmd_vel</text>

  <!-- MAVROS -->
  <rect x="40" y="324" width="320" height="78" rx="8" fill="#F3EEFE" stroke="#8B72BE" stroke-width="1"/>
  <text x="200" y="350" text-anchor="middle" fill="#4E3D80" font-size="13" font-weight="600">MAVROS</text>
  <text x="200" y="368" text-anchor="middle" fill="#7A6BA0" font-size="10">EXTERNAL_VISION_POSITION_ESTIMATE</text>
  <text x="200" y="384" text-anchor="middle" fill="#7A6BA0" font-size="10">SET_POSITION_TARGET / mode + arm</text>

  <!-- cmd_vel_stamper -->
  <rect x="540" y="324" width="320" height="78" rx="8" fill="#FFF0E8" stroke="#D85A30" stroke-width="1"/>
  <text x="700" y="350" text-anchor="middle" fill="#712B13" font-size="13" font-weight="600">cmd_vel_stamper</text>
  <text x="700" y="368" text-anchor="middle" fill="#A86040" font-size="10">Twist → TwistStamped (ArduPilot needs frame_id)</text>
  <text x="700" y="386" text-anchor="middle" fill="#A86040" font-size="9" font-style="italic">rover_nav/cmd_vel_stamper.py</text>

  <!-- cmd_vel_stamper → MAVROS -->
  <line x1="540" y1="363" x2="364" y2="363" stroke="#333" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="396" y="350" width="180" height="22" rx="11" fill="#fff" stroke="#bbb" stroke-width="0.8"/>
  <text x="486" y="365" text-anchor="middle" fill="#666" font-size="10">/mavros/setpoint_velocity/cmd_vel</text>

  <!-- MAVROS down to ardupilot -->
  <line x1="200" y1="402" x2="200" y2="448" stroke="#333" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="148" y="414" width="104" height="22" rx="11" fill="#fff" stroke="#bbb" stroke-width="0.8"/>
  <text x="200" y="429" text-anchor="middle" fill="#666" font-size="10">MAVLink @ 921600</text>

  <!-- ══════════ FLIGHT CONTROLLER ══════════ -->
  <rect x="40" y="448" width="320" height="86" rx="8" fill="#F5F5F2" stroke="#888" stroke-width="1"/>
  <text x="200" y="476" text-anchor="middle" fill="#333" font-size="13" font-weight="600">Pixracer Pro · ArduRover 4.6.3</text>
  <text x="200" y="496" text-anchor="middle" fill="#777" font-size="10">EKF3 with VISO source · GPS off</text>
  <text x="200" y="514" text-anchor="middle" fill="#777" font-size="10">GUIDED mode · vision yaw</text>
  <text x="200" y="528" text-anchor="middle" fill="#aaa" font-size="9">Output 1: SteeringServo · Output 3: Throttle</text>

  <!-- ══════════ ACTUATION ══════════ -->
  <text x="32" y="566" fill="#333" font-size="13" font-weight="600">Drive</text>

  <rect x="40" y="580" width="200" height="74" rx="8" fill="#F5F5F2" stroke="#888" stroke-width="1"/>
  <text x="140" y="606" text-anchor="middle" fill="#333" font-size="13" font-weight="600">Steering servo</text>
  <text x="140" y="624" text-anchor="middle" fill="#777" font-size="10">Output 1 · 1100–1900 µs</text>
  <text x="140" y="640" text-anchor="middle" fill="#777" font-size="10">SERVO1_FUNCTION = 26</text>

  <rect x="280" y="580" width="200" height="74" rx="8" fill="#F5F5F2" stroke="#888" stroke-width="1"/>
  <text x="380" y="606" text-anchor="middle" fill="#333" font-size="13" font-weight="600">Traxxas ESC + motor</text>
  <text x="380" y="624" text-anchor="middle" fill="#777" font-size="10">Output 3 · 1100–1900 µs</text>
  <text x="380" y="640" text-anchor="middle" fill="#777" font-size="10">SERVO3_FUNCTION = 70</text>

  <rect x="520" y="580" width="340" height="74" rx="8" fill="#F5F5F2" stroke="#888" stroke-width="1"/>
  <text x="690" y="606" text-anchor="middle" fill="#333" font-size="13" font-weight="600">Traxxas Ackermann chassis</text>
  <text x="690" y="624" text-anchor="middle" fill="#777" font-size="10">Front-steered RC car · 0.9 m turn radius</text>
  <text x="690" y="640" text-anchor="middle" fill="#777" font-size="10">cannot rotate in place — needs forward velocity</text>

  <!-- arrows from FC down to actuators -->
  <path d="M140,534 L140,562 L140,576" fill="none" stroke="#333" stroke-width="1.2" marker-end="url(#arr)"/>
  <path d="M260,534 L260,556 L380,556 L380,576" fill="none" stroke="#333" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ESC → chassis & servo → chassis -->
  <line x1="240" y1="616" x2="276" y2="616" stroke="#333" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="480" y1="616" x2="516" y2="616" stroke="#333" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ══════════ TF TREE side panel ══════════ -->
  <rect x="540" y="448" width="320" height="86" rx="8" fill="none" stroke="#bbb" stroke-width="0.8" stroke-dasharray="4,3"/>
  <text x="700" y="468" text-anchor="middle" fill="#666" font-size="11" font-weight="600">TF tree</text>
  <text x="556" y="488" fill="#666" font-size="10" font-family="monospace">map → odom → zed_camera_link → base_link</text>
  <text x="556" y="504" fill="#888" font-size="9">  static       ZED VIO publishes      static (inverted offset)</text>
  <text x="556" y="522" fill="#aaa" font-size="9" font-style="italic">single-parent constraint flips the camera-to-base mount</text>

  <!-- ══════════ LEGEND ══════════ -->
  <g transform="translate(32,684)">
    <rect x="0" y="0" width="14" height="14" rx="3" fill="#EBF5FF" stroke="#4A90D9" stroke-width="0.8"/>
    <text x="20" y="11" fill="#666" font-size="10">Sensor</text>
    <rect x="80" y="0" width="14" height="14" rx="3" fill="#E6F7F0" stroke="#1D9E75" stroke-width="0.8"/>
    <text x="100" y="11" fill="#666" font-size="10">Bridge</text>
    <rect x="160" y="0" width="14" height="14" rx="3" fill="#FFF0E8" stroke="#D85A30" stroke-width="0.8"/>
    <text x="180" y="11" fill="#666" font-size="10">Nav / control</text>
    <rect x="270" y="0" width="14" height="14" rx="3" fill="#F3EEFE" stroke="#8B72BE" stroke-width="0.8"/>
    <text x="290" y="11" fill="#666" font-size="10">MAVROS</text>
    <rect x="350" y="0" width="14" height="14" rx="3" fill="#F5F5F2" stroke="#888" stroke-width="0.8"/>
    <text x="370" y="11" fill="#666" font-size="10">Flight controller / drive</text>
  </g>

  <text x="450" y="710" text-anchor="middle" fill="#333" font-size="12" font-weight="600">Fig. 1 — System architecture of the MARS rover</text>
</svg>
